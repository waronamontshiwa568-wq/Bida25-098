<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Your Glow-Luminous Lace Bridal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- NAVIGATION -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="bookyourglow.html">Book Your Glow</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="lacelegacygallery.html">Lace Legacy Gallery</a></li>
            <li><a href="luminousstories.html">Luminous Stories</a></li>
        </ul>
    </nav>
    <!-- MAIN CONTENT -->
    <main>

        <!-- PAGE HEADER -->
        <header>
            <h1>Make An Appointment</h1>
        </header>
<!-- BOOKING SECTION -->
        <section>

            <!-- Date Selection -->
            <div>
                <label for="appointment-date">Select the Date:</label>
                <input type="date" id="appointment-date">
            </div>

            <!-- Time Selection -->
            <div>
                <label for="appointment-time">Available Hours:</label>
                <select id="appointment-time">
                    <option value="">-- Select a time --</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="13:00">1:00 PM</option>
                    <option value="14:00">2:00 PM</option>
                    <option value="15:00">3:00 PM</option>
                    <option value="16:00">4:00 PM</option>
                </select>
            </div>

            <!-- Submit Button -->
            <div>
                <button type="button">Book an Appointment</button>
            </div>

        </section>

        <!-- OPENING HOURS -->
        <aside>
            <h2>Opening Hours:</h2>
            <table>
                <tr>
                    <td>Monday</td>
                    <td>Closed</td>
                </tr>
                <tr>
                    <td>Tuesday - Friday</td>
                    <td>10:00 AM - 6:00 PM</td>
                </tr>
                <tr>
                    <td>Saturday</td>
                    <td>9:00 AM - 5:00 PM</td>
                </tr>
                <tr>
                    <td>Sunday</td>
                    <td>By Appointment Only</td>
                </tr>
            </table>
        </aside>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Luminous Lace Bridal. All rights reserved.</p>
    </footer>

  
</body>
</html>
