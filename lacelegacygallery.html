<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lace Legacy Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f7f5;
            color: #333;
        }
        header {
            background: #222;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        main {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .gallery {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }
        .gallery-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }
        .gallery-item img {
            display: block;
            width: 100%;
            height: auto;
        }
        .gallery-item figcaption {
            padding: 0.75rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Lace Legacy Gallery</h1>
    </header>
    <main>
        <section class="gallery">
            <figure class="gallery-item">
                <img src="image1.jpg" alt="Lace design 1" />
                <figcaption>Lace design 1</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="image2.jpg" alt="Lace design 2" />
                <figcaption>Lace design 2</figcaption>
            </figure>
            <figure class="gallery-item">
                <img src="image3.jpg" alt="Lace design 3" />
                <figcaption>Lace design 3</figcaption>
            </figure>
        </section>
    </main>
</body>
</html>
